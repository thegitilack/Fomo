[build]
  command = "npm run build"
  publish = "dist"

# The Fomo app is the site root (index.html).
# Design-system style guide at /ds
[[redirects]]
  from = "/ds"
  to = "/fomo-ds.html"
  status = 200

# Base component demo at /demo
[[redirects]]
  from = "/demo"
  to = "/demo.html"
  status = 200
