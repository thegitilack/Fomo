<!-- @dsCard group="Components" viewport="700x260" name="Navigation" subtitle="Status bar, FAB and bottom nav" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0}
  body{background:#1c1c1b;font-family:var(--fomo-font-sans);padding:20px;display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .device{width:300px;background:var(--fomo-bg);border:1px solid var(--fomo-screen-border);border-radius:28px;overflow:hidden}
  .pad{padding:8px 0 0}
  .fabwrap{display:flex;flex-direction:column;align-items:center;gap:12px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const NS = Object.values(window).find(o => o && typeof o === "object" && o.BottomNav && o.FAB && o.StatusBar) || {};
  const { BottomNav, FAB, StatusBar } = NS;
  function App(){
    const [v,setV] = React.useState("today");
    if(!BottomNav) return <div style={{color:"#888",fontSize:13}}>Bundle loading…</div>;
    return (
      <React.Fragment>
        <div className="device">
          <StatusBar />
          <div style={{height:90}}></div>
          <BottomNav active={v} onChange={setV} />
        </div>
        <div className="fabwrap"><FAB /></div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
